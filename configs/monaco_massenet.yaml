# Monaco snapshot: Massenet (Turn 4–5, the long sweeping right after Casino
# Square into Mirabeau). Chosen for the sweep because it gives the widest
# visible context — useful for evaluating whether a layout reads as "track"
# at all, before stressing it on tighter corners.
#
# (x_m, y_m, yaw_rad) are derived from configs/monaco_centerline.geojson via
# scripts/derive_corner_poses.py — re-run that script if either the centerline
# or the corner lat/lon hint changes (a regression test pins these values).
# viewport_m is left unset so the layout sweep can derive a layout-appropriate
# crop (see Config.viewport_m).
layout_config: layout_standard.yaml

snapshot:
  mosaic: monaco_mosaic.yaml
  x_m: 426.525
  y_m: 461.197
  yaw_rad: 2.507995

car:
  dimensions_cm: [61.0, 25.0]
  orientation_deg: -90.0
